services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupyter-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    # Keep the container running so VS Code can attach to it.
    command: sleep infinity
